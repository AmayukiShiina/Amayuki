<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>天雪シイナ | 雙形態官網</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 基礎轉場效果 */
        body { transition: all 0.5s ease; }
        .mode-transition { transition: all 0.5s ease-in-out; }
        
        /* 天使模式樣式 */
        .angel-mode { background-color: #f0f9ff; color: #0369a1; }
        .angel-hero { background: linear-gradient(135deg, #0ea5e9 0%, #bae6fd 100%); }

        /* 惡魔模式樣式 */
        .demon-mode { background-color: #1a1a2e; color: #e0e0e0; }
        .demon-hero { background: linear-gradient(135deg, #4c1d95 0%, #1e1b4b 100%); }
    </style>
</head>
<body id="mainBody" class="angel-mode">

    <div class="fixed top-20 right-5 z-[100]">
        <button onclick="toggleMode()" id="modeBtn" class="bg-white text-sky-600 px-6 py-2 rounded-full shadow-2xl font-bold border-2 border-sky-400 hover:scale-105 transition">
            切換為：惡魔形態 😈
        </button>
    </div>

    <section id="heroBanner" class="angel-hero min-h-screen flex items-center justify-center mode-transition">
        <div class="text-center text-white">
            <h1 id="charName" class="text-7xl font-black mb-4">天雪シイナ</h1>
            <p id="slogan" class="text-2xl tracking-[0.2em]">「在純淨的冬雪中，守護你的微笑。」</p>
            
            <div class="mt-10">
                <img id="mainModel" src="https://via.placeholder.com/400x600/e0f2fe/0ea5e9?text=Angel+Model" class="mx-auto rounded-lg shadow-2xl border-4 border-white">
            </div>
        </div>
    </section>

    <script>
        function toggleMode() {
            const body = document.getElementById('mainBody');
            const hero = document.getElementById('heroBanner');
            const btn = document.getElementById('modeBtn');
            const name = document.getElementById('charName');
            const slogan = document.getElementById('slogan');
            const model = document.getElementById('mainModel');

            if (body.classList.contains('angel-mode')) {
                // 切換到惡魔
                body.classList.replace('angel-mode', 'demon-mode');
                hero.classList.replace('angel-hero', 'demon-hero');
                btn.innerText = "切換為：天使形態 👼";
                btn.style.color = "#a78bfa";
                btn.style.borderColor = "#a78bfa";
                slogan.innerText = "「墮入深淵吧，這場雪...是紫色的。」";
                model.src = "https://via.placeholder.com/400x600/2e1065/a78bfa?text=Demon+Model"; // 換成惡魔立繪網址
            } else {
                // 切換到天使
                body.classList.replace('demon-mode', 'angel-mode');
                hero.classList.replace('demon-hero', 'angel-hero');
                btn.innerText = "切換為：惡魔形態 😈";
                btn.style.color = "#0ea5e9";
                btn.style.borderColor = "#0ea5e9";
                slogan.innerText = "「在純淨的冬雪中，守護你的微笑。」";
                model.src = "https://via.placeholder.com/400x600/e0f2fe/0ea5e9?text=Angel+Model"; // 換成天使立繪網址
            }
        }
    </script>
</body>
</html>
