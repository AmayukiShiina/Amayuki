<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天雪シイナ | 鏡像現實</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@900&family=Noto+Sans+TC:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --angel-bg: #f0f9ff;
            --demon-bg: #1a0505;
            --transition-speed: 0.8s;
            --transition-curve: cubic-bezier(0.4, 0, 0.2, 1);
        }

        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: var(--angel-bg); font-family: 'Noto Sans TC', sans-serif; }

        .stage {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color var(--transition-speed) var(--transition-curve);
        }

        /* 觸發區域 */
        .trigger-zone {
            position: absolute;
            left: 0;
            width: 100%;
            height: 50vh;
            z-index: 40;
        }
        .zone-top { top: 0; }
        .zone-bottom { bottom: 0; }

        /* 背景大字 - 顏色加深 */
        .bg-title {
            position: absolute;
            font-family: 'Noto Serif TC', serif;
            font-size: 25vw;
            white-space: nowrap;
            z-index: 0;
            transition: color var(--transition-speed), opacity var(--transition-speed);
            pointer-events: none;
            user-select: none;
            letter-spacing: -0.05em;
            font-weight: 900;
            opacity: 0.15; /* 加深透明度 */
            color: #0ea5e9;
        }

        /* 立繪容器 - 核心：重疊與遮罩 */
        .model-wrap {
            position: relative;
            height: 85vh;
            width: 60vw;
            z-index: 10;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .tachie {
            height: 100%;
            width: 100%;
            object-fit: contain;
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
        }

        /* 惡魔立繪：初始完全隱藏，等待滑鼠揭開 */
        .tachie-demon {
            z-index: 20;
            clip-path: circle(0% at 50% 50%); /* 預設揭開半徑為 0 */
            transition: clip-path 0.1s linear; /* 讓跟隨感更平滑 */
        }

        /* 玻璃卡片 */
        .glass-card {
            position: absolute;
            width: 300px;
            padding: 2.5rem 2rem;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 2rem;
            z-index: 100;
            transition: all var(--transition-speed) var(--transition-curve);
        }

        /* 惡魔模式樣式 */
        .stage.is-demon { background-color: var(--demon-bg); }
        .stage.is-demon .bg-title { color: #ef4444; opacity: 0.12; }
        .stage.is-demon .glass-card { 
            background: rgba(20, 0, 0, 0.6); 
            border-color: rgba(239, 68, 68, 0.3); 
            color: #fecaca;
        }

        .card-left { left: 5%; }
        .card-right { right: 5%; }
        
        .nav-link { transition: all 0.3s ease; display: flex; align-items: center; gap: 1rem; }
        .nav-link:hover { transform: translateX(10px); }

        @media (max-width: 768px) {
            .glass-card { position: relative; width: 90%; margin: 10px 0; }
            .stage { flex-direction: column; overflow-y: auto; justify-content: flex-start; padding-top: 2rem; }
            .model-wrap { height: 50vh; order: -1; width: 100%; }
        }
    </style>
</head>
<body>

    <div class="stage" id="mainStage">
        <div class="trigger-zone zone-top" onmouseenter="updateState('angel')"></div>
        <div class="trigger-zone zone-bottom" onmouseenter="updateState('demon')"></div>

        <div class="bg-title" id="bgTitle">天雪</div>

        <div class="glass-card card-left">
            <h3 class="text-[11px] tracking-[0.3em] opacity-50 mb-1 font-bold">個人檔案</h3>
            <h2 class="text-5xl font-bold mb-8 tracking-tighter transition-all" id="nameDisplay">天雪</h2>
            <div class="space-y-5 text-sm">
                <div class="flex justify-between border-b border-current/10 pb-2">
                    <span class="opacity-50">紀念日</span>
                    <span id="birthVal" class="font-bold">09 / 21</span>
                </div>
                <div class="flex justify-between border-b border-current/10 pb-2">
                    <span class="opacity-50">種族</span>
                    <span id="raceVal" class="font-bold">天使</span>
                </div>
                <div class="pt-4 italic opacity-80" id="bioText">
                    「願這場冬雪，能洗淨世間所有的哀愁。」
                </div>
            </div>
        </div>

        <div class="model-wrap" id="modelWrap">
            <img src="Tachie.png" class="tachie tachie-angel" alt="天使">
            <img src="Tachie_Demon.png" onerror="this.style.filter='hue-rotate(150deg) brightness(0.7)'" class="tachie tachie-demon" id="demonImg" alt="惡魔">
        </div>

        <div class="glass-card card-right">
            <h3 class="text-[11px] tracking-[0.3em] opacity-50 mb-1 font-bold">連結傳送門</h3>
            <h2 class="text-5xl font-bold mb-8 tracking-tighter">追蹤</h2>
            <nav class="flex flex-col gap-5 font-bold">
                <a href="https://www.youtube.com/@AmayukiShiina" target="_blank" class="nav-link" id="linkYt">
                    <span class="w-2 h-2 rounded-full bg-current"></span><span>YOUTUBE</span>
                </a>
                <a href="https://x.com/Shiina_Amayuk1" target="_blank" class="nav-link" id="linkX">
                    <span class="w-2 h-2 rounded-full bg-current"></span><span>TWITTER (X)</span>
                </a>
                <a href="https://www.twitch.tv/amayukishiina" target="_blank" class="nav-link" id="linkTw">
                    <span class="w-2 h-2 rounded-full bg-current"></span><span>TWITCH</span>
                </a>
            </nav>
            <div class="mt-14 text-[10px] opacity-30">© 2026 天雪シイナ 企劃</div>
        </div>
    </div>

    <script>
        const config = {
            angel: { name: "天雪", birth: "09 / 21", race: "天使", bio: "「願這場冬雪，能洗淨世間所有的哀愁。」", colors: ["#0ea5e9", "#38bdf8", "#8b5cf6"] },
            demon: { name: "夕納", birth: "09 / 16", race: "惡魔", bio: "「讓紅色的雪蓋過一切吧，靈魂什麼的...不需要喔。」", colors: ["#ef4444", "#f87171", "#fca5a5"] }
        };

        const stage = document.getElementById('mainStage');
        const demonImg = document.getElementById('demonImg');
        const bgTitle = document.getElementById('bgTitle');

        // 更新文字與狀態
        function updateState(mode) {
            const d = config[mode];
            mode === 'demon' ? stage.classList.add('is-demon') : stage.classList.remove('is-demon');
            document.getElementById('nameDisplay').innerText = d.name;
            bgTitle.innerText = d.name;
            document.getElementById('birthVal').innerText = d.birth;
            document.getElementById('raceVal').innerText = d.race;
            document.getElementById('bioText').innerText = d.bio;
            
            document.getElementById('linkYt').style.color = d.colors[0];
            document.getElementById('linkX').style.color = d.colors[1];
            document.getElementById('linkTw').style.color = d.colors[2];
        }

        // 滑鼠移動：掀開效果
        window.addEventListener('mousemove', (e) => {
            // 計算滑鼠相對於窗口的百分比位置
            const x = (e.clientX / window.innerWidth) * 100;
            const y = (e.clientY / window.innerHeight) * 100;
            
            // 揭開範圍半徑 (15% 圓形)
            // 你可以把 15% 改大，例如 25% 會揭開更多
            demonImg.style.clipPath = `circle(18% at ${x}% ${y}%)`;
        });

        // 初始狀態
        updateState('angel');
    </script>
</body>
</html>
