<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>RP Records | 天雪シイナ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="rp-body">
    <div class="rp-sidebar">
        <h3 class="text-red-500 font-black tracking-widest text-xs mb-10 uppercase">RP Data Files</h3>
        <div id="rp-menu"></div>
        <a href="index.html" class="mt-20 block text-[10px] opacity-30 hover:opacity-100 transition no-underline text-white uppercase font-bold tracking-widest">← Return to Gate</a>
    </div>
    
    <div class="rp-main">
        <div id="rp-detail">
            <div class="h-full flex items-center justify-center opacity-20">
                <p class="text-2xl font-black uppercase tracking-[1em]">Select a Record</p>
            </div>
        </div>
    </div>

    <script>
        const rpData = [
            { id: 0, server: "Spotlight RP", character: "天逸", status: "Active", desc: "在混亂的酒吧擔任主唱，同時也是神祕的消息販子。", tags: ["GTA5", "醫生"] },
            { id: 1, server: "星際末日 RP", character: "雪娜-09", status: "Ended", desc: "在荒涼行星獨自存活 300 年的仿生人，試圖尋找人類的遺跡。", tags: ["Sci-Fi", "仿生人"] }
        ];

        function renderMenu() {
            const menu = document.getElementById('rp-menu');
            menu.innerHTML = rpData.map(item => `
                <div class="rp-menu-item" id="rp-item-${item.id}" onclick="showDetail(${item.id})">
                    <div class="text-[9px] uppercase font-bold opacity-50">${item.status}</div>
                    <div class="text-sm font-black">${item.server}</div>
                </div>
            `).join('');
        }

        function showDetail(id) {
            const item = rpData[id];
            document.querySelectorAll('.rp-menu-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`rp-item-${id}`).classList.add('active');
            
            document.getElementById('rp-detail').innerHTML = `
                <div class="animate-[rpFade_0.5s_ease]">
                    <h3 class="text-red-500 font-black tracking-[0.5em] mb-4 text-xs uppercase">Record Log #${id}</h3>
                    <h2 class="text-8xl font-black mb-12 tracking-tighter">${item.character}</h2>
                    <div class="grid grid-cols-2 gap-10 mb-12">
                        <div><span class="text-[10px] opacity-40 uppercase block mb-2">Location</span><p class="text-2xl font-bold">${item.server}</p></div>
                        <div><span class="text-[10px] opacity-40 uppercase block mb-2">Status</span><p class="text-2xl font-bold">${item.status}</p></div>
                    </div>
                    <p class="text-2xl leading-relaxed text-white/70 max-w-3xl font-light">${item.desc}</p>
                </div>
            `;
        }
        renderMenu();
    </script>
</body>
</html>
